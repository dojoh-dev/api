name: Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  REGION: us-central1
  REPO: api-preview
  IMAGE: api-preview

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCR_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: dojoh-dev
          service_account_key: ${{ secrets.GCR_KEY }}

      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Image
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/dojoh-dev/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} -f ci/Dockerfile .

      - name: Push Image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/dojoh-dev/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy api-preview-${{ github.event.pull_request.number }} \
            --image ${{ env.REGION }}-docker.pkg.dev/dojoh-dev/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

      - name: Comment on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "🚀 Preview deployed: https://api-preview-dojoh-dev.run.app"
