name: CI Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.11
          cache: false

      - name: Install dependencies
        run: bun install

      - name: Test build
        run: bun run build

      - name: Biome check
        run: bun run biome:check

      - name: Unit tests
        run: bun run test:unit
